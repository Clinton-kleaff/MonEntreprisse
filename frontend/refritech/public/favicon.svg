<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Brand gradient -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d81b60"/>
      <stop offset="100%" stop-color="#ff4da6"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Bigger, more dominant open circle -->
  <circle cx="32" cy="32" r="26"
          stroke="url(#grad)"
          stroke-width="5"
          fill="none"
          stroke-linecap="round"
          stroke-dasharray="135 55"
          transform="rotate(40 32 32)"
          filter="url(#shadow)"/>

  <!-- Larger centered logo text -->
  <text x="50%" y="52%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="20"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="800"
        fill="#d81b60"
        filter="url(#shadow)">
    WGT
  </text>

  <!-- Slightly repositioned sparkles -->
  <g fill="#ff4da6" filter="url(#glow)" opacity="0.95">
    <circle cx="52" cy="44" r="1.2"/>
    <circle cx="55" cy="40" r="0.8"/>
    <circle cx="47" cy="49" r="0.7"/>
  </g>
</svg>