<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Main brand color -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d81b60"/>
      <stop offset="100%" stop-color="#ff4da6"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#ffffff"/>

  <!-- Open circle (bottom-right gap) -->
  <circle cx="32" cy="32" r="22"
          stroke="url(#grad)"
          stroke-width="4"
          fill="none"
          stroke-linecap="round"
          stroke-dasharray="115 40"
          transform="rotate(40 32 32)"/>

  <!-- WGT Text -->
  <text x="50%" y="50%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="16"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        fill="#d81b60">
    WGT
  </text>

  <!-- Sparkles -->
  <g fill="#ff4da6" filter="url(#glow)">
    <circle cx="49" cy="45" r="1.2"/>
    <circle cx="52" cy="42" r="0.8"/>
    <circle cx="46" cy="48" r="0.7"/>
  </g>
</svg>