<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Main brand color -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d81b60"/>
      <stop offset="100%" stop-color="#ff4da6"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#ffffff"/>

  <!-- Slightly larger open circle -->
  <circle cx="32" cy="32" r="24"
          stroke="url(#grad)"
          stroke-width="4.5"
          fill="none"
          stroke-linecap="round"
          stroke-dasharray="125 45"
          transform="rotate(40 32 32)"/>

  <!-- Slightly larger WGT Text (still safely inside circle) -->
  <text x="50%" y="50%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="18"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        fill="#d81b60">
    WGT
  </text>

  <!-- Sparkles (scaled slightly for balance) -->
  <g fill="#ff4da6" filter="url(#glow)">
    <circle cx="50" cy="46" r="1.3"/>
    <circle cx="53" cy="43" r="0.9"/>
    <circle cx="46" cy="49" r="0.8"/>
  </g>
</svg>